name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety pylint

      - name: Security: Bandit (code vulnerability scan)
        run: bandit -r . -ll --exclude tests,venv,.venv -f json -o bandit-report.json

      - name: Security: Safety (dependency check)
        run: safety check --json

      - name: Linting: Pylint
        run: pylint task_api.py auth.py models.py --fail-under=8

      - name: Run tests
        env:
          SECRET_KEY: test-secret-123456-very-long-random-key
          QUEUE_BACKEND: sqlite
          RATE_LIMIT_BACKEND: memory
        run: pytest -q
