name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety pylint
    
    - name: Lint with ruff
      run: |
        ruff check .
    
    - name: Format check with black
      run: |
        black --check .
    
    - name: Type checking with mypy
      run: |
        mypy app --ignore-missing-imports
    
    - name: Security scan with bandit
      run: |
        bandit -r app -ll

    - name: Dependency vulnerability scan with safety
      run: |
        safety check --json

    - name: Lint with pylint
      run: |
        pylint app/config.py app/security.py app/routers/auth.py --disable=C0114,C0115,C0116,C0301,R0903 --fail-under=8.0
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

    - name: Export OpenAPI schema
      run: |
        python scripts/export_openapi.py

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Upload OpenAPI artifact
      uses: actions/upload-artifact@v4
      with:
        name: openapi-schema
        path: openapi.json

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety pylint
    
    - name: Run bandit (security check)
      run: |
        bandit -r app -ll -f json -o bandit-report.json
    
    - name: Check dependencies with safety
      run: |
        safety check --json

    - name: Lint with pylint
      run: |
        pylint app/config.py app/security.py app/routers/auth.py --disable=C0114,C0115,C0116,C0301,R0903 --fail-under=8.0

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: task-manager-pro:latest
