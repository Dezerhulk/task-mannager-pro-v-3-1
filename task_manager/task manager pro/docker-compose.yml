version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_manager_network

  app:
    build: .
    container_name: task_manager_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/task_manager_db
      SQL_ECHO: "False"
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - task_manager_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: uvicorn app.main_pro:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:

networks:
  task_manager_network:
    driver: bridge
