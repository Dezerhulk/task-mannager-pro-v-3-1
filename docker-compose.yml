version: "3.9"

services:
  task_api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; response=urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5); sys.exit(0 if response.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
